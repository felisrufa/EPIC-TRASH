<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReLISTO – Trash Management Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Century+Gothic|Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── ReLISTO Brand Palette ─────────────────────────────── */
  :root {
    --lime:        #AEC637;   /* Pantone 14-1106 primary   */
    --sage-light:  #CDDD8E;   /* Pantone 13-0401 primary   */
    --warm-gray:   #B8BA91;   /* Pantone 19-3903 secondary */
    --charcoal:    #555552;   /* Pantone 19-0406 secondary */
    --cream:       #DFE1CF;   /* Pantone 15-1305 secondary */
    --off-white:   #F7F8F2;   /* very light bg             */
    --client-blue: #1D3557;
    --client-bg:   #E8F0F8;
    --client-bdr:  #A8C5E0;
    --border:      #D8DAC5;
    --ink:         #2E2E2C;
    --muted:       #777770;
    --done-bg:     #F0F5DC;
    --done-text:   #6A7A20;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', 'Helvetica', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--charcoal);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(0,0,0,0.25);
  }

  .header-inner {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    padding: 0 36px;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 0;
    border-right: 1px solid rgba(255,255,255,0.1);
    padding-right: 24px;
    margin-right: 24px;
  }

  .header-logo {
    height: 38px;
    filter: brightness(10) saturate(0); /* white logo */
  }

  .header-title {
    font-family: 'Century Gothic', 'Nunito Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sage-light);
    line-height: 1.3;
  }

  .header-title small {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .progress-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }

  .progress-lbl { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; }
  .progress-bar { width: 160px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--lime); border-radius: 3px; transition: width 0.4s; }
  .progress-count { font-size: 12px; font-weight: 700; color: var(--lime); }

  /* ── Sync status ─────────────────────────────────────────── */
  .sync-bar {
    background: var(--lime);
    color: var(--charcoal);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 5px 36px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--charcoal); }
  .sync-dot.ok { background: #1a5c1a; }
  .sync-dot.error { background: #8b0000; }
  .sync-dot.loading { background: var(--charcoal); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Toolbar ─────────────────────────────────────────────── */
  .toolbar {
    padding: 12px 36px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 2px solid var(--border);
    background: #fff;
  }

  .btn {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }
  .btn.primary { background: var(--lime); color: var(--charcoal); border-color: var(--lime); font-weight: 800; }
  .btn.primary:hover { background: #8fa528; border-color: #8fa528; }
  .btn.accent { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }

  /* ── DB Config Banner ────────────────────────────────────── */
  .db-banner {
    background: #fff8dc;
    border-bottom: 2px solid #f0c040;
    padding: 14px 36px;
    font-size: 12px;
    color: #6b5500;
  }

  .db-banner-inner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 860px;
  }

  .db-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .db-row-actions {
    margin-top: 4px;
    border-top: 1px dashed #d4aa00;
    padding-top: 8px;
  }

  .db-label {
    font-weight: 700;
    width: 100px;
    flex-shrink: 0;
    font-size: 12px;
    color: #6b5500;
  }

  .db-hint {
    color: #a08020;
    font-size: 11px;
    padding: 0 4px;
  }

  .db-banner input {
    font-family: 'Nunito Sans', monospace;
    font-size: 12px;
    border: 1.5px solid #d4aa00;
    border-radius: 4px;
    padding: 5px 10px;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    color: var(--ink);
    background: #fffdf0;
  }

  .db-banner input:focus { outline: none; border-color: #8fa528; }

  /* Connected info bar */
  .db-connected {
    background: var(--done-bg);
    border-bottom: 2px solid var(--lime);
    padding: 10px 36px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--done-text);
    flex-wrap: wrap;
  }

  .db-connected strong { font-weight: 700; }
  .db-connected .bin-id-box {
    font-family: monospace;
    background: #fff;
    border: 1px solid var(--lime);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--charcoal);
    cursor: pointer;
    user-select: all;
  }
  .db-connected .btn-small {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    color: var(--charcoal);
    font-weight: 700;
  }
  .db-connected .btn-small:hover { background: var(--charcoal); color: #fff; }

  /* ── Legend ──────────────────────────────────────────────── */
  .legend {
    padding: 8px 36px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--off-white);
  }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Main content ────────────────────────────────────────── */
  .main {
    max-width: 920px;
    margin: 24px auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-card {
    background: #fff;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    transition: box-shadow 0.2s;
  }
  .section-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1.5px solid var(--border);
  }

  .sec-num {
    font-family: 'Century Gothic', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--charcoal);
    background: var(--sage-light);
    padding: 3px 9px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sec-title {
    font-family: 'Century Gothic', sans-serif;
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    color: var(--charcoal);
  }

  .sec-prog { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .sec-tog { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .sec-tog.open { transform: rotate(180deg); }
  .sec-body { display: none; }
  .sec-body.open { display: block; }

  /* ── Task Row ────────────────────────────────────────────── */
  .task-row {
    padding: 16px 20px;
    border-bottom: 1px solid #f0edea;
    transition: background 0.15s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: #fafaf5; }
  .task-row.done { background: var(--done-bg); }

  .task-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .task-check {
    width: 20px; height: 20px;
    accent-color: var(--lime);
    cursor: pointer;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .task-label {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
    flex: 1;
    color: var(--ink);
    transition: all 0.2s;
  }
  .task-row.done .task-label { text-decoration: line-through; color: var(--done-text); opacity: 0.7; }

  .done-tag {
    font-size: 10px;
    background: var(--lime);
    color: var(--charcoal);
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 700;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Dates row ───────────────────────────────────────────── */
  .date-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
    padding-left: 32px;
  }

  .date-group {
    display: flex;
    align-items: center;
    gap: 7px;
    border-radius: 6px;
    padding: 5px 11px;
    border: 1px solid var(--border);
    background: var(--off-white);
  }
  .date-group.due { border-color: #e8a040; background: #fffaf3; }
  .date-group.done-date { border-color: var(--lime); background: var(--done-bg); }

  .date-icon { font-size: 13px; }
  .date-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); white-space: nowrap; }
  .date-group.due .date-lbl { color: #b06a00; font-weight: 700; }
  .date-group.done-date .date-lbl { color: var(--done-text); font-weight: 700; }

  .date-input {
    font-family: 'Nunito Sans', monospace;
    font-size: 12px;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    width: 122px;
    cursor: pointer;
  }

  /* ── Notes blocks ────────────────────────────────────────── */
  .notes-area {
    padding-left: 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .notes-block { display: flex; flex-direction: column; gap: 4px; }

  .notes-hdr {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
  }

  .notes-hdr.field { color: var(--charcoal); }
  .notes-hdr.client { color: var(--client-blue); }

  .notes-input {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    background: var(--off-white);
    color: var(--ink);
    width: 100%;
    resize: vertical;
    min-height: 38px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .notes-input:focus { outline: none; border-color: var(--lime); }
  .notes-input::placeholder { color: #c0bdb5; }
  .notes-input[readonly] {
    background: #f4f5ec;
    color: #666;
    cursor: default;
  }

  .client-input {
    background: var(--client-bg) !important;
    border: 1.5px solid var(--client-bdr) !important;
    color: var(--client-blue) !important;
    min-height: 52px;
    font-weight: 600;
  }
  .client-input:focus { border-color: var(--client-blue) !important; }
  .client-input::placeholder { color: #8ba9c5 !important; font-weight: 400; }

  .badge {
    font-size: 9px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge.field { background: var(--warm-gray); color: var(--charcoal); }
  .badge.client { background: var(--client-blue); color: #fff; }
  .badge.instr { background: var(--lime); color: var(--charcoal); }

  /* ── Modal ───────────────────────────────────────────────── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,30,28,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 10px;
    width: 100%;
    max-width: 860px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 36px;
    position: relative;
    box-shadow: 0 12px 48px rgba(0,0,0,0.35);
  }

  .modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none;
    font-size: 22px; cursor: pointer; color: var(--muted);
  }

  .modal h2 {
    font-family: 'Century Gothic', sans-serif;
    font-size: 20px; font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 4px;
  }
  .modal-tabs { display: flex; gap: 8px; margin: 16px 0 22px; flex-wrap: wrap; }
  .modal-tab {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 11px; font-weight: 700;
    padding: 6px 14px; border-radius: 4px;
    border: 1.5px solid var(--border);
    background: #fff; color: var(--ink);
    cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.15s;
  }
  .modal-tab.active { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }

  /* timeline chart */
  .chart-axis { display: flex; margin-left: 210px; margin-bottom: 6px; }
  .chart-axis span { flex: 1; font-size: 10px; color: var(--muted); text-align: center; }
  .tl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .tl-label { font-size: 10px; width: 200px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-bar-wrap { flex: 1; height: 15px; background: #eee; border-radius: 4px; position: relative; min-width: 300px; }
  .tl-bar { height: 100%; border-radius: 4px; position: absolute; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
  .tl-bar-txt { font-size: 9px; color: #fff; font-weight: 700; white-space: nowrap; }
  .tl-done-line { position: absolute; top: -3px; height: 21px; width: 3px; background: var(--lime); border-radius: 2px; z-index: 2; }

  .sec-divider { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin: 12px 0 5px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

  /* report */
  .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .report-card { background: var(--off-white); border: 1.5px solid var(--border); border-radius: 8px; padding: 16px 18px; }
  .report-card .rc-num { font-family: 'Century Gothic', sans-serif; font-size: 32px; font-weight: 700; color: var(--lime); }
  .report-card .rc-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .report-table th { background: var(--charcoal); color: #fff; padding: 8px 10px; text-align: left; font-family: 'Century Gothic', sans-serif; font-size: 11px; letter-spacing: 1px; }
  .report-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  .report-table tr:hover td { background: var(--off-white); }
  .status-done { color: var(--done-text); font-weight: 700; }
  .status-over { color: #c0392b; font-weight: 700; }
  .status-open { color: var(--muted); }

  .no-data { font-size: 13px; color: var(--muted); text-align: center; padding: 40px; border: 2px dashed var(--border); border-radius: 8px; }

  /* toast */
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--charcoal); color: #fff; padding: 10px 22px;
    border-radius: 6px; font-size: 13px; font-weight: 600; z-index: 999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  /* ── Add Task / Custom Task UI ─── */
  .add-task-row {
    padding: 10px 20px;
    border-top: 1px dashed var(--border);
    background: var(--off-white);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .add-task-btn {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--lime);
    background: none;
    border: 1.5px dashed var(--lime);
    border-radius: 5px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .add-task-btn:hover { background: var(--lime); color: var(--charcoal); }

  .add-task-input-wrap { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }

  .add-task-input {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 13px;
    border: 1.5px solid var(--lime);
    border-radius: 5px;
    padding: 6px 12px;
    flex: 1;
    min-width: 180px;
    color: var(--ink);
    outline: none;
    background: #fff;
  }

  .custom-badge {
    font-size: 9px;
    background: var(--sage-light);
    color: var(--charcoal);
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .delete-task-btn {
    background: none;
    border: 1.5px solid #e0c0c0;
    color: #c0392b;
    border-radius: 4px;
    width: 26px;
    height: 26px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    margin-left: auto;
  }
  .delete-task-btn:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

  @media(max-width:620px){
    header { padding: 0; }
    .header-inner, .toolbar, .legend, .db-banner, .sync-bar { padding-left: 14px; padding-right: 14px; }
    .main { margin: 12px auto; }
    .task-row { padding: 12px 14px; }
    .section-header { padding: 12px 14px; }
    .date-row, .notes-area { padding-left: 0; }
    .modal { padding: 18px 14px; }
    .tl-label { width: 120px; }
    .chart-axis { margin-left: 130px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand">

<script>
/* ───────────────────────── DATA ───────────────────────── */
const SECTIONS = [
  { id:'s1', num:'01', title:'Initial Cleanup & Baseline', tasks:[
    { t:'Clean all trash cans (interior/exterior)',             instr:'Inspect both indoor and outdoor cans. Wash with disinfectant, remove residue, dry completely before relining.' },
    { t:'Ensure all trash cans are lined',                      instr:'Use appropriate bag sizes per can. Check liner security — bags must fully cover interior lip.' },
    { t:'Remove all loose trash from floors and common areas',  instr:'Walk all common areas, hallways, parking. Document before/after photos.' },
    { t:'Clean and sanitize all trash rooms/areas',             instr:'Use EPA-approved disinfectant. Scrub floors, walls, door handles. Ventilate rooms after.' },
    { t:'Ensure trash areas are sealed (no pest entry points)', instr:'Inspect door seals, gaps, drains. Notify maintenance if any pest entry points are found.' }
  ]},
  { id:'s2', num:'02', title:'Define Trash System', tasks:[
    { t:'Define 75% capacity rule',                             instr:'Cans should be emptied when 75% full — never wait until overflowing. Document rule in SOP.' },
    { t:'Define schedule for emptying floor trash cans',        instr:'Set recurring schedule. Minimum once daily for high-traffic areas, twice for kitchens.' },
    { t:'Define schedule for transporting trash to main bins',  instr:'Assign specific times. Coordinate with pickup days to avoid overflow.' },
    { t:'Define schedule for moving bins to street',            instr:'Match Recology pickup schedule. Record pickup days for each property.' },
    { t:'Assign responsibilities (office staff, RM, PM)',       instr:'Create RACI chart. Every role must have a named backup person.' },
    { t:'Document full trash SOP',                              instr:'SOP must cover all 7 sections. Upload to AppFolio after completion.' }
  ]},
  { id:'s3', num:'03', title:'Staffing & Accountability', tasks:[
    { t:'Engage resident manager and require plan',             instr:'Schedule meeting. RM must submit a written plan within 5 business days of engagement.' },
    { t:'Define roles and responsibilities by position',        instr:'Document each role in writing. Include office staff, RM, PM, and any contractors.' },
    { t:'Create escalation protocol for issues',                instr:'Issues must be escalated within 24hrs. Define chain: RM → PM → Director.' },
    { t:'Define tenant violation process',                      instr:'Review lease addendum. Document warning → notice → fine escalation steps.' }
  ]},
  { id:'s4', num:'04', title:'Audit System', tasks:[
    { t:'Create daily audit protocol (office staff)',           instr:'Checklist must cover all trash areas. Results logged in AppFolio daily.' },
    { t:'Create weekend audit protocol (resident manager)',     instr:'RM performs Saturday and Sunday audits. Report sent to PM by Sunday 8pm.' },
    { t:'Create PM audit process (monthly/biweekly)',          instr:'PM conducts surprise audits. Use photo documentation every audit.' },
    { t:'Implement 3-week audit trial',                        instr:'Run trial with full logging. Review results weekly. Adjust schedule if needed.' },
    { t:'Define reporting chain for issues',                    instr:'All audit issues reported same day. Unresolved issues escalate after 48hrs.' }
  ]},
  { id:'s5', num:'05', title:'Tenant Communication', tasks:[
    { t:'Create and post signage',                              instr:'Bilingual signage at all trash areas. Font minimum 18pt. Include pickup days.' },
    { t:'Develop tenant communication materials',               instr:'Email template + door flyer. Reviewed by PM before distribution.' },
    { t:'Establish tenant reporting process (full cans, misuse)', instr:'Provide phone number or email for tenant reports. Acknowledge within 24hrs.' },
    { t:'Draft lease addendum for tenant responsibilities',     instr:'Legal review required. Addendum must address improper disposal, bulk items, fines.' },
    { t:'Coordinate rollout with leasing team',                 instr:'Brief leasing team before tenant communications go out. Answer Q&A at rollout.' }
  ]},
  { id:'s6', num:'06', title:'Vendor & Cost Control', tasks:[
    { t:'Contact Recology and gather account details',          instr:'Collect account number, contact name, pickup schedule, special item procedures.' },
    { t:'Establish baseline monthly costs',                     instr:'Pull 3 months of Recology invoices. Document baseline in AppFolio.' },
    { t:'Identify cost-saving opportunities',                   instr:'Evaluate bin size, pickup frequency, recycling vs landfill split.' },
    { t:'Document fines and penalties',                         instr:'Record all fines with date, amount, reason. Identify recurring violations.' },
    { t:'Present findings to management',                       instr:'Schedule meeting within 2 weeks of data collection. Prepare 1-page summary.' }
  ]},
  { id:'s7', num:'07', title:'AppFolio Documentation', tasks:[
    { t:'Add notes to property page',                           instr:'Include pickup days, vendor contact, and special instructions in property notes.' },
    { t:'Create Utilities/Trash folder',                        instr:'Folder must be accessible to all staff. Use standard naming convention.' },
    { t:'Create "General Information – Trash" documentation',  instr:'Cover schedule, SOP link, contacts, fines history, and any exceptions.' },
    { t:'Upload SOP and account details',                       instr:'PDF format. Version-controlled. Notify team via AppFolio message when uploaded.' }
  ]},
  { id:'s8', num:'08', title:'Final Validation', tasks:[
    { t:'All trash cans clean, lined, and odor-free',           instr:'Final walk-through with PM present. Sign-off required before close-out.' },
    { t:'No trash outside receptacles',                         instr:'Check parking lot, hallways, bin areas. Zero tolerance at validation.' },
    { t:'No pests or evidence of pests',                        instr:'Document any pest evidence with photos. Pest sighting = immediate escalation.' },
    { t:'Trash system functioning daily without failure',       instr:'Review 2 weeks of audit logs before validation. No gaps allowed.' },
    { t:'Staff can explain process and responsibilities',       instr:'Verbal quiz with each staff member. Document responses. All must pass.' }
  ]}
];

/* ───────────────────────── STATE ───────────────────────── */
let state = {};
let customTasks = {};  // { sectionId: [{label:'...'}] }
let apiKey    = localStorage.getItem('relisto_apikey') || '';
let binId     = '';   // set per property+checklist combo
let syncTimer = null;

// Build a storage key from property + checklist names
function storageKey(prop, chk) {
  return 'relisto_bin__' + encodeURIComponent((prop||'').trim().toLowerCase()) + '__' + encodeURIComponent((chk||'').trim().toLowerCase());
}

// Currently connected property+checklist labels
let connectedProperty  = '';
let connectedChecklist = '';

function initState() {
  SECTIONS.forEach(sec => {
    sec.tasks.forEach((task, ti) => {
      const key = `${sec.id}_t${ti}`;
      if (!state[key]) state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:task.instr||'' };
      ['dueDate','doneDate','fieldNotes'].forEach(f => { if(!(f in state[key])) state[key][f]=''; });
      if (!('instr' in state[key])) state[key].instr = task.instr||'';
      if (!('done' in state[key])) state[key].done = false;
    });
    // custom tasks for this section
    if (!customTasks[sec.id]) customTasks[sec.id] = [];
    customTasks[sec.id].forEach((ct, ci) => {
      const key = `${sec.id}_custom${ci}`;
      if (!state[key]) state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
      ['dueDate','doneDate','fieldNotes','instr'].forEach(f => { if(!(f in state[key])) state[key][f]=''; });
      if (!('done' in state[key])) state[key].done = false;
    });
  });
}

/* ───────────────────────── RENDER ─────────────────────── */
function render() {
  const root = document.getElementById('checklistRoot');
  root.innerHTML = '';
  SECTIONS.forEach(sec => {
    const doneCount = sec.tasks.filter((_,ti) => state[`${sec.id}_t${ti}`]?.done).length;
    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <span class="sec-num">${sec.num}</span>
      <span class="sec-title">${sec.title}</span>
      <span class="sec-prog">${doneCount}/${sec.tasks.length}</span>
      <span class="sec-tog open" id="tog_${sec.id}">▾</span>`;
    hdr.onclick = () => toggleSec(sec.id);
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'sec-body open';
    body.id = `body_${sec.id}`;

    sec.tasks.forEach((task, ti) => {
      const key = `${sec.id}_t${ti}`;
      const s = state[key];
      const row = document.createElement('div');
      row.className = `task-row${s.done?' done':''}`;

      row.innerHTML = `
        <div class="task-top">
          <input type="checkbox" class="task-check" ${s.done?'checked':''} onchange="toggleTask('${key}',this.checked)">
          <div class="task-label">${task.t}${s.done?'<span class="done-tag">✓ Done</span>':''}</div>
        </div>
        <div class="date-row">
          <div class="date-group due">
            <span class="date-icon">📅</span>
            <span class="date-lbl">Due Date</span>
            <input type="date" class="date-input" value="${s.dueDate}" onchange="updateField('${key}','dueDate',this.value)">
          </div>
          <div class="date-group done-date">
            <span class="date-icon">✅</span>
            <span class="date-lbl">Done Date</span>
            <input type="date" class="date-input" value="${s.doneDate}" onchange="updateField('${key}','doneDate',this.value)">
          </div>
        </div>
        <div class="notes-area">
          <div class="notes-block">
            <div class="notes-hdr"><span class="badge instr">Instructions</span></div>
            <textarea class="notes-input" placeholder="Enter instructions or details…" onchange="updateField('${key}','instr',this.value)">${s.instr}</textarea>
          </div>
          <div class="notes-block">
            <div class="notes-hdr field"><span class="badge field">Field Agent</span></div>
            <textarea class="notes-input" placeholder="Field agent: enter observations, completion notes, issues found…" onchange="updateField('${key}','fieldNotes',this.value)">${s.fieldNotes}</textarea>
          </div>
`;
      body.appendChild(row);
    });

    // ── custom tasks ──
    if (!customTasks[sec.id]) customTasks[sec.id] = [];
    customTasks[sec.id].forEach((ct, ci) => {
      const key = `${sec.id}_custom${ci}`;
      const s = state[key] || { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
      const row = document.createElement('div');
      row.className = `task-row custom-task${s.done?' done':''}`;
      row.innerHTML = `
        <div class="task-top">
          <input type="checkbox" class="task-check" ${s.done?'checked':''} onchange="toggleCustomTask('${sec.id}',${ci},this.checked)">
          <div class="task-label">${ct.label}${s.done?'<span class="done-tag">✓ Done</span>':''} <span class="custom-badge">Custom</span></div>
          <button class="delete-task-btn" onclick="deleteCustomTask('${sec.id}',${ci})" title="Delete this task">✕</button>
        </div>
        <div class="date-row">
          <div class="date-group due">
            <span class="date-icon">📅</span>
            <span class="date-lbl">Due Date</span>
            <input type="date" class="date-input" value="${s.dueDate}" onchange="updateCustomField('${sec.id}',${ci},'dueDate',this.value)">
          </div>
          <div class="date-group done-date">
            <span class="date-icon">✅</span>
            <span class="date-lbl">Done Date</span>
            <input type="date" class="date-input" value="${s.doneDate}" onchange="updateCustomField('${sec.id}',${ci},'doneDate',this.value)">
          </div>
        </div>
        <div class="notes-area">
          <div class="notes-block">
            <div class="notes-hdr"><span class="badge instr">Instructions</span></div>
            <textarea class="notes-input" placeholder="Enter instructions or details…" onchange="updateCustomField('${sec.id}',${ci},'instr',this.value)">${s.instr}</textarea>
          </div>
          <div class="notes-block">
            <div class="notes-hdr field"><span class="badge field">Field Agent</span></div>
            <textarea class="notes-input" placeholder="Field agent: enter observations, completion notes, issues found…" onchange="updateCustomField('${sec.id}',${ci},'fieldNotes',this.value)">${s.fieldNotes}</textarea>
          </div>
        </div>`;
      body.appendChild(row);
    });

    // ── Add Task button ──
    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    addRow.id = `addrow_${sec.id}`;
    addRow.innerHTML = `
      <button class="add-task-btn" onclick="showAddTask('${sec.id}')">+ Add Task</button>
      <div class="add-task-input-wrap" id="addinput_${sec.id}" style="display:none">
        <input type="text" class="add-task-input" id="addinput_text_${sec.id}" placeholder="Task name…" onkeydown="if(event.key==='Enter')confirmAddTask('${sec.id}')">
        <button class="btn primary" onclick="confirmAddTask('${sec.id}')">Add</button>
        <button class="btn" onclick="cancelAddTask('${sec.id}')">Cancel</button>
      </div>`;
    body.appendChild(addRow);

    card.appendChild(body);
    root.appendChild(card);
  });
  updateProgress();
}

function toggleSec(id) {
  document.getElementById(`body_${id}`)?.classList.toggle('open');
  document.getElementById(`tog_${id}`)?.classList.toggle('open');
}
function expandAll()  { SECTIONS.forEach(s => { document.getElementById(`body_${s.id}`)?.classList.add('open'); document.getElementById(`tog_${s.id}`)?.classList.add('open'); }); }
function collapseAll(){ SECTIONS.forEach(s => { document.getElementById(`body_${s.id}`)?.classList.remove('open'); document.getElementById(`tog_${s.id}`)?.classList.remove('open'); }); }

function toggleTask(key, checked) {
  syncTextareas();
  state[key].done = checked;
  if (checked && !state[key].doneDate) state[key].doneDate = new Date().toISOString().split('T')[0];
  render();
  scheduleSave();
}

function updateField(key, field, val) {
  state[key][field] = val;
  updateProgress();
  scheduleSave();
}

/* ── Custom Task Functions ─────────────────────────────── */
function showAddTask(secId) {
  document.getElementById(`addinput_${secId}`).style.display = 'flex';
  document.querySelector(`#addrow_${secId} .add-task-btn`).style.display = 'none';
  setTimeout(() => document.getElementById(`addinput_text_${secId}`).focus(), 50);
}

function cancelAddTask(secId) {
  document.getElementById(`addinput_${secId}`).style.display = 'none';
  document.querySelector(`#addrow_${secId} .add-task-btn`).style.display = '';
  document.getElementById(`addinput_text_${secId}`).value = '';
}

function confirmAddTask(secId) {
  const input = document.getElementById(`addinput_text_${secId}`);
  const label = input.value.trim();
  if (!label) { input.focus(); return; }
  if (!customTasks[secId]) customTasks[secId] = [];
  customTasks[secId].push({ label });
  const key = `${secId}_custom${customTasks[secId].length - 1}`;
  state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
  render();
  // re-open the section that was being edited
  document.getElementById(`body_${secId}`)?.classList.add('open');
  document.getElementById(`tog_${secId}`)?.classList.add('open');
  scheduleSave();
}

function toggleCustomTask(secId, ci, checked) {
  syncTextareas();
  const key = `${secId}_custom${ci}`;
  if (!state[key]) state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
  state[key].done = checked;
  if (checked && !state[key].doneDate) state[key].doneDate = new Date().toISOString().split('T')[0];
  render();
  document.getElementById(`body_${secId}`)?.classList.add('open');
  document.getElementById(`tog_${secId}`)?.classList.add('open');
  scheduleSave();
}

function updateCustomField(secId, ci, field, val) {
  const key = `${secId}_custom${ci}`;
  if (!state[key]) state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
  state[key][field] = val;
  updateProgress();
  scheduleSave();
}

function deleteCustomTask(secId, ci) {
  if (!confirm('Delete this task? This cannot be undone.')) return;
  syncTextareas();
  // Remove from customTasks array
  customTasks[secId].splice(ci, 1);
  // Rebuild state keys for this section's custom tasks
  const newState = {};
  customTasks[secId].forEach((ct, newCi) => {
    const oldKey = `${secId}_custom${newCi >= ci ? newCi + 1 : newCi}`;
    const newKey = `${secId}_custom${newCi}`;
    newState[newKey] = state[oldKey] || { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
  });
  // Remove old keys for this section
  Object.keys(state).forEach(k => { if (k.startsWith(`${secId}_custom`)) delete state[k]; });
  Object.assign(state, newState);
  render();
  document.getElementById(`body_${secId}`)?.classList.add('open');
  document.getElementById(`tog_${secId}`)?.classList.add('open');
  scheduleSave();
}

function updateProgress() {
  let total=0, done=0;
  // count built-in tasks
  SECTIONS.forEach(sec => {
    sec.tasks.forEach((_,ti) => {
      const s = state[`${sec.id}_t${ti}`];
      if (s) { total++; if(s.done) done++; }
    });
    // count custom tasks
    (customTasks[sec.id]||[]).forEach((_,ci) => {
      const s = state[`${sec.id}_custom${ci}`];
      if (s) { total++; if(s.done) done++; }
    });
  });
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = `${done} / ${total} done`;
}

function syncTextareas() {
  document.querySelectorAll('textarea:not([readonly])').forEach(ta => {
    const oc = ta.getAttribute('onchange') || '';
    // built-in: updateField('s1_t0','fieldNotes',...)
    const m1 = oc.match(/updateField\('([^']+)','([^']+)'/);
    if (m1 && state[m1[1]]) { state[m1[1]][m1[2]] = ta.value; return; }
    // custom: updateCustomField('s1',0,'fieldNotes',...)
    const m2 = oc.match(/updateCustomField\('([^']+)',(\d+),'([^']+)'/);
    if (m2) {
      const key = `${m2[1]}_custom${m2[2]}`;
      if (!state[key]) state[key] = { done:false, dueDate:'', doneDate:'', fieldNotes:'', instr:'' };
      state[key][m2[3]] = ta.value;
    }
  });
}

/* ───────────────────────── JSONBIN ─────────────────────── */
function setSyncStatus(status, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncMsg');
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
}

async function connectDB() {
  const key  = document.getElementById('apiKeyInput').value.trim();
  const prop = document.getElementById('propertyInput').value.trim();
  const chk  = document.getElementById('checklistInput').value.trim();

  if (!key)  { alert('Please enter your JSONBin Master Key.'); return; }
  if (!prop) { alert('Please enter a Property name.'); return; }
  if (!chk)  { alert('Please enter a Checklist name.'); return; }

  apiKey = key;
  connectedProperty  = prop;
  connectedChecklist = chk;
  localStorage.setItem('relisto_apikey', key);

  setSyncStatus('loading', 'Connecting…');

  // Check if we already have a bin for this property+checklist
  const sKey = storageKey(prop, chk);
  const savedBinId = localStorage.getItem(sKey);

  if (savedBinId) {
    binId = savedBinId;
    await loadFromBin();
  } else {
    await createBin();
  }
}

async function connectWithBinId() {
  const key   = document.getElementById('apiKeyInput').value.trim();
  const bId   = document.getElementById('binIdInput').value.trim();
  const prop  = document.getElementById('propertyInput').value.trim() || 'My Property';
  const chk   = document.getElementById('checklistInput').value.trim() || 'My Checklist';

  if (!key) { alert('Please enter your JSONBin Master Key.'); return; }
  if (!bId) { alert('Please paste a Bin ID.'); return; }

  apiKey = key;
  binId  = bId;
  connectedProperty  = prop;
  connectedChecklist = chk;
  localStorage.setItem('relisto_apikey', key);
  localStorage.setItem(storageKey(prop, chk), bId);

  setSyncStatus('loading', 'Joining existing database…');
  await loadFromBin();
}

function disconnectDB() {
  binId = '';
  connectedProperty = '';
  connectedChecklist = '';
  document.getElementById('dbConnected').style.display = 'none';
  document.getElementById('dbBanner').style.display = 'block';
  setSyncStatus('', 'Disconnected — enter details above to reconnect');
}

function copyBinId() {
  navigator.clipboard.writeText(binId).then(() => showToast('✓ Bin ID copied to clipboard!')).catch(() => {
    prompt('Copy this Bin ID:', binId);
  });
}

async function createBin() {
  setSyncStatus('loading', 'Creating shared database…');
  const binName = `${connectedProperty} - ${connectedChecklist}`.substring(0, 128).replace(/[^\x00-\xFF]/g, '');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': apiKey,
        'X-Bin-Name': binName.replace(/[^\x20-\x7E]/g, '').substring(0, 128),
        'X-Collection-Name': 'ReLISTO'
      },
      body: JSON.stringify({ state, customTasks, property: connectedProperty, checklist: connectedChecklist, version:1 })
    });
    const d = await r.json();
    if (d.metadata?.id) {
      binId = d.metadata.id;
      localStorage.setItem(storageKey(connectedProperty, connectedChecklist), binId);
      showConnectedBar();
      setSyncStatus('ok', `✓ Saved — ${new Date().toLocaleTimeString()}`);
      showToast('✓ Database created! Share Bin ID: ' + binId);
    } else {
      setSyncStatus('error', 'Connection failed — check your Master Key');
    }
  } catch(e) { setSyncStatus('error', 'Network error: ' + e.message); }
}

async function loadFromBin() {
  if (!apiKey || !binId) return;
  setSyncStatus('loading','Syncing…');
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers:{ 'X-Master-Key': apiKey }
    });
    const d = await r.json();
    if (d.record?.state) {
      state = d.record.state;
      if (d.record.customTasks) customTasks = d.record.customTasks;
      if (d.record.property)  connectedProperty  = d.record.property;
      if (d.record.checklist) connectedChecklist = d.record.checklist;
      initState();
      render();
      showConnectedBar();
      setSyncStatus('ok', '✓ Synced — ' + new Date().toLocaleTimeString());
    } else {
      setSyncStatus('error', 'No data found in bin — check Bin ID');
    }
  } catch(e) { setSyncStatus('error','Sync failed: '+e.message); }
}

async function saveToBin() {
  if (!apiKey || !binId) { saveLocal(); return; }
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': apiKey },
      body: JSON.stringify({ state, customTasks, property: connectedProperty, checklist: connectedChecklist, version:1, updatedAt: new Date().toISOString() })
    });
    setSyncStatus('ok','✓ Saved to cloud — '+new Date().toLocaleTimeString());
    saveLocal();
  } catch(e) { setSyncStatus('error','Save failed: '+e.message); saveLocal(); }
}

function showConnectedBar() {
  document.getElementById('dbBanner').style.display = 'none';
  const bar = document.getElementById('dbConnected');
  bar.style.display = 'flex';
  document.getElementById('dbConnectedLabel').textContent =
    `${connectedProperty || '—'}  /  ${connectedChecklist || '—'}`;
  document.getElementById('binIdDisplay').textContent = binId;
}

function saveLocal() {
  try { localStorage.setItem('relisto_state_v2', JSON.stringify({state, customTasks})); } catch(e){}
}

function scheduleSave() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncTextareas(); saveToBin(); }, 1500);
}

async function syncNow() {
  syncTextareas();
  if (apiKey && binId) {
    await loadFromBin();
  } else {
    saveToBin();
    showToast('Saved locally. Connect JSONBin to sync with others.');
  }
}

/* ───────────────────────── MODAL ───────────────────────── */
let currentModalTab = 'timeline';

function openModal(tab) {
  currentModalTab = tab;
  document.getElementById('modalBg').classList.add('open');
  renderModalContent();
  // update tab buttons
  document.querySelectorAll('.modal-tab').forEach((btn,i) => btn.classList.toggle('active', ['timeline','report'][i]===tab));
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

function switchModalTab(tab, btn) {

function renderModalContent() {

  else renderReport(c);
}

/* ──── Timeline ──── */
function renderTimeline(wrap) {
  const items = [];
  SECTIONS.forEach(sec => {
    sec.tasks.forEach((task, ti) => {
      const key = `${sec.id}_t${ti}`;
      const s = state[key];
      if (s.dueDate || s.doneDate) {
        items.push({ label:task.t, dueDate:s.dueDate, doneDate:s.doneDate, done:s.done, section:sec.title, color:'var(--lime)' });
      }
    });
  });

  if (!items.length) { wrap.innerHTML=`<div class="no-data">No dates set yet. Add due or done dates to see the timeline.</div>`; return; }

  items.sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const allTs = []; items.forEach(i=>{ if(i.dueDate) allTs.push(new Date(i.dueDate).getTime()); if(i.doneDate) allTs.push(new Date(i.doneDate).getTime()); });
  const minD=Math.min(...allTs), maxD=Math.max(...allTs), range=maxD-minD||86400000;
  const fmt = d => { if(!d) return ''; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  const pct = t => Math.max(0,Math.min(97,((t-minD)/range)*100));

  let html=`<div style="min-width:560px;overflow-x:auto"><div class="chart-axis">`;
  for(let i=0;i<=5;i++) html+=`<span>${fmt(new Date(minD+(range*i/5)))}</span>`;
  html+=`</div>`;

  let lastSec='';
  items.forEach(item=>{
    if(item.section!==lastSec){ html+=`<div class="sec-divider">${item.section}</div>`; lastSec=item.section; }
    const dueT = item.dueDate?new Date(item.dueDate).getTime():null;
    const doneT= item.doneDate?new Date(item.doneDate).getTime():null;
    const left = dueT?pct(dueT):0;
    const donePct = doneT?pct(doneT):null;
    const barColor = item.done?'var(--lime)':'var(--warm-gray)';

    html+=`<div class="tl-row">
      <div class="tl-label" title="${item.label}">${item.done?'✓ ':''}${item.label}</div>
      <div class="tl-bar-wrap">
        ${dueT?`<div class="tl-bar" style="background:${barColor};opacity:0.8;left:${left}%;width:${Math.max(8,100-left)}%"><span class="tl-bar-txt">${fmt(item.dueDate)}</span></div>`:''}
        ${donePct!==null?`<div class="tl-done-line" style="left:${donePct}%" title="Done: ${fmt(item.doneDate)}"></div>`:''}
      </div>
    </div>`;
  });
  html+=`</div>`;
  wrap.innerHTML = html;
}

/* ──── Report ──── */
function renderReport(wrap) {
  syncTextareas();
  let total=0, done=0, overdue=0;
  const today = new Date().toISOString().split('T')[0];
  const overdueItems = [];

  SECTIONS.forEach(sec => {
    sec.tasks.forEach((task, ti) => {
      const key = `${sec.id}_t${ti}`;
      const s = state[key];
      total++;
      if (s.done) done++;
      if (!s.done && s.dueDate && s.dueDate < today) {
        overdue++;
        overdueItems.push({ section:sec.title, label:task.t, dueDate:s.dueDate });
      }

    });
  });

  const pct = total ? Math.round((done/total)*100) : 0;

  let html = `
    <div class="report-grid">
      <div class="report-card"><div class="rc-num">${done}/${total}</div><div class="rc-lbl">Tasks Complete</div></div>
      <div class="report-card"><div class="rc-num">${pct}%</div><div class="rc-lbl">Overall Progress</div></div>
      <div class="report-card"><div class="rc-num" style="color:${overdue?'#c0392b':'var(--lime)'}">${overdue}</div><div class="rc-lbl">Overdue Tasks</div></div>

    </div>`;

  // Section progress
  html += `<h3 style="font-family:'Century Gothic',sans-serif;color:var(--charcoal);margin-bottom:10px;font-size:14px">Section Progress</h3>`;
  html += `<table class="report-table"><tr><th>Section</th><th>Done</th><th>Total</th><th>%</th></tr>`;
  SECTIONS.forEach(sec => {
    const d = sec.tasks.filter((_,ti) => state[`${sec.id}_t${ti}`]?.done).length;
    const t = sec.tasks.length;
    const p = Math.round((d/t)*100);
    html += `<tr><td>${sec.title}</td><td>${d}</td><td>${t}</td><td><b style="color:${p===100?'var(--done-text)':'var(--charcoal)'}">${p}%</b></td></tr>`;
  });
  html += `</table>`;

  if (overdueItems.length) {
    html += `<h3 style="font-family:'Century Gothic',sans-serif;color:#c0392b;margin:20px 0 10px;font-size:14px">⚠ Overdue Tasks</h3>`;
    html += `<table class="report-table"><tr><th>Section</th><th>Task</th><th>Due</th></tr>`;
    overdueItems.forEach(i => html+=`<tr><td>${i.section}</td><td>${i.label}</td><td class="status-over">${i.dueDate}</td></tr>`);
    html += `</table>`;
  }

  wrap.innerHTML = html;
}

/* ───────────────────────── EXPORT ─────────────────────── */
function exportCSV() {
  syncTextareas();
  let csv = 'Section,Task,Done,Due Date,Done Date,Instructions,Field Agent\n';
  SECTIONS.forEach(sec => {
    sec.tasks.forEach((task, ti) => {
      const s = state[`${sec.id}_t${ti}`];
      const esc = v => (v||'').replace(/"/g,'""');
      csv += `"${sec.title}","${task.t}","${s.done?'Yes':'No'}","${s.dueDate}","${s.doneDate}","${esc(s.instr)}","${esc(s.fieldNotes)}"\n`;
    });
    (customTasks[sec.id]||[]).forEach((ct, ci) => {
      const s = state[`${sec.id}_custom${ci}`] || {};
      const esc = v => (v||'').replace(/"/g,'""');
      csv += `"${sec.title} (Custom)","${ct.label}","${s.done?'Yes':'No'}","${s.dueDate||''}","${s.doneDate||''}","${esc(s.instr)}","${esc(s.fieldNotes)}"\n`;
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'relisto_trash_checklist.csv';
  a.click();
}

/* ───────────────────────── UTILS ───────────────────────── */
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

/* ───────────────────────── INIT ───────────────────────── */
document.getElementById('modalBg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

/* ── Recent Connections Picker ──────────────────────────────── */
function buildRecentConnections(storageKeys) {
  if (!storageKeys.length) return;
  const banner = document.getElementById('dbBanner');
  const inner = banner.querySelector('.db-banner-inner');

  const recDiv = document.createElement('div');
  recDiv.style.cssText = 'border-top:1px dashed #d4aa00;margin-top:6px;padding-top:8px;';
  recDiv.innerHTML = '<span style="font-weight:700;font-size:11px;color:#6b5500;">⚡ Recent connections — click to reconnect:</span>';

  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;';

  storageKeys.forEach(sKey => {
    const bId = localStorage.getItem(sKey);
    if (!bId) return;
    // Decode property + checklist from key
    const parts = sKey.replace('relisto_bin__','').split('__');
    const prop = decodeURIComponent(parts[0] || '');
    const chk  = decodeURIComponent(parts[1] || '');
    const label = `${prop} / ${chk}`;

    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.style.cssText = 'font-size:11px;padding:5px 10px;background:#fffdf0;border-color:#d4aa00;color:#6b5500;';
    btn.textContent = label;
    btn.onclick = () => {
      binId = bId;
      connectedProperty  = prop;
      connectedChecklist = chk;
      setSyncStatus('loading', `Reconnecting to ${label}…`);
      loadFromBin();
    };

    // Delete button per entry
    const del = document.createElement('span');
    del.textContent = '✕';
    del.style.cssText = 'margin-left:5px;cursor:pointer;color:#c0392b;font-weight:700;';
    del.title = 'Remove from recent';
    del.onclick = (e) => {
      e.stopPropagation();
      localStorage.removeItem(sKey);
      btn.parentElement.removeChild(btn);
    };
    btn.appendChild(del);
    list.appendChild(btn);
  });

  recDiv.appendChild(list);
  inner.appendChild(recDiv);
}

initState();
// Load local first
try {
  const saved = localStorage.getItem('relisto_state_v2');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = parsed.state || parsed;
    customTasks = parsed.customTasks || {};
    initState();
  }
} catch(e){}

render();

// Auto-connect if keys already saved
if (apiKey) {
  document.getElementById('apiKeyInput').value = apiKey;
}
// Check localStorage for any previously connected bins and show a picker if found
const allKeys = Object.keys(localStorage).filter(k => k.startsWith('relisto_bin__'));
if (allKeys.length > 0 && apiKey) {
  buildRecentConnections(allKeys);
}
</script>
